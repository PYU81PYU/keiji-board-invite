<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>連絡掲示板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F1F5F9;min-height:100vh}
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.spinner{width:36px;height:36px;border:3px solid #E2E8F0;border-top-color:#4F46E5;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.big-icon{font-size:52px;margin-bottom:16px}
.label{font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:1px;margin-bottom:8px}
h1{font-size:22px;font-weight:800;color:#0F172A;margin-bottom:16px}
.pill{display:inline-block;background:#EEF2FF;color:#4F46E5;border-radius:999px;padding:5px 14px;font-size:13px;font-weight:700;margin-bottom:8px}
.role-desc{font-size:13px;color:#64748B;margin-bottom:24px}
.btn{display:block;background:#4F46E5;color:#fff;border-radius:14px;padding:15px;font-size:16px;font-weight:700;text-decoration:none;margin-bottom:12px}
.note{font-size:12px;color:#94A3B8;line-height:1.6}
.hint{background:#F8FAFC;border-radius:12px;padding:14px;margin-top:18px;text-align:left;font-size:12px;color:#64748B}
.hint b{display:block;margin-bottom:6px;font-weight:600}
.hint ol{padding-left:16px}
.hint li{margin-bottom:3px;line-height:1.5}
header{background:#4F46E5;padding:14px 18px;color:#fff;position:sticky;top:0}
.h-row{display:flex;align-items:center;gap:10px}
.h-ico{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0}
.h-name{font-size:15px;font-weight:700;flex:1}
.h-tag{background:rgba(255,255,255,.2);font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.notice{font-size:12px;color:#64748B;padding:9px 16px;background:#fff;border-bottom:1px solid #E2E8F0}
.list{padding:12px;display:flex;flex-direction:column;gap:9px}
.post{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.pt{font-size:15px;font-weight:700;color:#0F172A;margin-bottom:6px}
.pb{font-size:13px;color:#475569;line-height:1.7;margin-bottom:9px;white-space:pre-line}
.pm{display:flex;justify-content:space-between;font-size:11px;color:#94A3B8}
.empty{text-align:center;padding:50px 20px;color:#94A3B8;font-size:14px}
#load{display:flex}
#inv,#ext,#err{display:none}
</style>
</head>
<body>
<div id="load" class="center"><div class="spinner"></div></div>
<div id="err" class="center">
  <div class="card">
    <div class="big-icon">&#128279;</div>
    <h1 style="font-size:18px">&#12522;&#12531;&#12463;&#12364;&#28104;&#12427;&#12371;&#12392;&#12364;&#12391;&#12365;&#12414;&#12379;&#12435;</h1>
    <p class="note" id="emsg">&#25307;&#24453;&#12522;&#12531;&#12463;&#12398;&#26399;&#38480;&#12364;&#20999;&#12428;&#12390;&#12356;&#12427;&#12363;&#12289;&#12377;&#12391;&#12395;&#28104;&#12383;&#12428;&#12390;&#12356;&#12414;&#12377;&#12290;</p>
  </div>
</div>
<div id="inv" class="center">
  <div class="card">
    <div class="big-icon">&#128172;</div>
    <p class="label">&#12464;&#12523;&#12540;&#12503;&#12408;&#12398;&#25307;&#24453;</p>
    <h1 id="iname"></h1>
    <div class="pill" id="irole"></div>
    <p class="role-desc" id="idesc"></p>
    <a class="btn" id="ibtn" href="#">&#12450;&#12503;&#12522;&#12391;&#38283;&#12367;</a>
    <p class="note">&#12450;&#12503;&#12522;&#12364;&#12452;&#12531;&#12473;&#12488;&#12540;&#12523;&#28168;&#12415;&#12398;&#22580;&#21512;&#12399;&#19978;&#12434;&#12479;&#12483;&#12503;</p>
    <div class="hint">
      <b>&#12450;&#12503;&#12522;&#12364;&#38283;&#12363;&#12394;&#12356;&#22580;&#21512;</b>
      <ol>
        <li>&#21491;&#19978;&#12300;&#8230;&#12301;&#8594;&#12300;Safari&#12391;&#38283;&#12367;&#12301;&#12434;&#36984;&#25246;</li>
        <li>Safari&#12391;&#12371;&#12398;&#12506;&#12540;&#12472;&#12434;&#20877;&#24230;&#38283;&#12356;&#12390;&#12300;&#12450;&#12503;&#12522;&#12391;&#38283;&#12367;&#12301;&#12434;&#12479;&#12483;&#12503;</li>
      </ol>
    </div>
  </div>
</div>
<div id="ext">
  <header>
    <div class="h-row">
      <div class="h-ico" id="eico"></div>
      <span class="h-name" id="ename"></span>
      <span class="h-tag">&#22806;&#37096;&#38599;&#35239;</span>
    </div>
  </header>
  <div class="notice">&#12371;&#12398;&#12506;&#12540;&#12472;&#12399;&#22806;&#37096;&#20844;&#38283;&#12373;&#12428;&#12383;&#25237;&#31295;&#12398;&#12415;&#34920;&#31034;&#12373;&#12428;&#12414;&#12377;</div>
  <div class="list" id="posts"></div>
</div>
<script>
var SB='https://vwgbxisxflerawgjkriw.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3Z2J4aXN4ZmxlcmF3Z2prcml3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODQyNTQsImV4cCI6MjA5ODI2MDI1NH0.TNnSRtOLcv7tv00ayyLg_SyFZHSdahtIrzp32JJLu8s';
function show(id){['load','err','inv','ext'].forEach(function(i){document.getElementById(i).style.display='none'});document.getElementById(id).style.display=(id==='ext')?'block':'flex'}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function date(s){var d=new Date(s);return(d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}
function get(path){return fetch(SB+path,{headers:{apikey:KEY,Authorization:'Bearer '+KEY}}).then(function(r){if(!r.ok)throw r;return r.json()})}
function setGroupName(gname){
  var ico=gname?gname.charAt(0).toUpperCase():'G';
  document.getElementById('eico').textContent=ico;
  document.getElementById('ename').textContent=gname||'';
  document.getElementById('iname').textContent=gname||'';
}
(function(){
  var token=(new URLSearchParams(location.search)).get('token');
  if(!token){show('err');return}
  get('/rest/v1/invite_tokens?token=eq.'+encodeURIComponent(token)+'&select=role,group_id&limit=1')
  .then(function(rows){
    if(!rows||rows.length===0){show('err');return}
    var r=rows[0],role=r.role,groupId=r.group_id;
    // fetch group name separately to avoid RLS join issues
    get('/rest/v1/groups?id=eq.'+groupId+'&select=name&limit=1')
    .then(function(gs){return(gs&&gs[0]&&gs[0].name)||''})
    .catch(function(){return''})
    .then(function(gname){
      setGroupName(gname);
      if(role==='external'){
        get('/rest/v1/posts?group_id=eq.'+groupId+'&visibility=eq.external&order=created_at.desc&select=id,title,content,created_at,profiles!posts_author_id_fkey(display_name)')
        .then(function(ps){
          var el=document.getElementById('posts');
          if(!ps||ps.length===0){el.innerHTML='<div class="empty">&#20844;&#38283;&#25237;&#31295;&#12399;&#12354;&#12426;&#12414;&#12379;&#12435;</div>';}
          else{el.innerHTML=ps.map(function(p){var au=(p.profiles&&p.profiles.display_name)||'';return'<div class="post"><div class="pt">'+esc(p.title)+'</div><div class="pb">'+esc(p.content)+'</div><div class="pm"><span>'+esc(au)+'</span><span>'+date(p.created_at)+'</span></div></div>'}).join('')}
          show('ext');
        }).catch(function(){show('ext')});
      }else{
        var label=role==='editor'?'&#32232;&#38598;&#32773;':'&#38299;&#35239;&#32773;';
        var desc=role==='editor'?'&#25237;&#31295;&#12398;&#20316;&#25104;&#12539;&#32232;&#38598;&#12364;&#12391;&#12365;&#12414;&#12377;':'&#25237;&#31295;&#12434;&#38299;&#35239;&#12391;&#12365;&#12414;&#12377;';
        var deep='keijiboard://invite/'+token;
        document.getElementById('irole').innerHTML=label;
        document.getElementById('idesc').innerHTML=desc;
        document.getElementById('ibtn').href=deep;
        setTimeout(function(){location.href=deep},800);
        show('inv');
      }
    });
  }).catch(function(){show('err')});
})();
</script>
</body>
</html>
